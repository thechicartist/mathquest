<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreQuest — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="corequest-icon.svg">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,#B3E5FC 0%,#E1F5FE 40%,#F1F8E9 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; padding-top:80px;
  }
  .login-card {
    background:white; border-radius:28px; padding:40px 36px;
    width:100%; max-width:420px;
    box-shadow:0 16px 50px rgba(0,0,0,0.15);
    border:4px solid #E8EAF6; text-align:center;
  }
  .login-logo { font-family:'Fredoka One',cursive; font-size:2.4rem; color:#FF7043; margin-bottom:4px; }
  .login-logo span { color:#3F51B5; }
  .login-subtitle { font-size:0.95rem; color:#90A4AE; font-weight:600; margin-bottom:28px; }
  .login-field { margin-bottom:14px; text-align:left; }
  .login-field label { display:block; font-weight:800; font-size:0.85rem; color:#546E7A; margin-bottom:6px; }
  .login-field input {
    width:100%; padding:13px 16px; border-radius:14px;
    border:3px solid #E0E0E0; font-family:'Nunito',sans-serif;
    font-size:1rem; font-weight:700; color:#1A237E;
    outline:none; transition:border-color 0.2s;
  }
  .login-field input:focus { border-color:#7986CB; }
  .login-btn {
    width:100%; padding:15px; border:none; border-radius:16px;
    background:linear-gradient(135deg,#a56117,#f07f05 ); color:white;
    font-family:'Fredoka One',cursive; font-size:1.3rem; cursor:pointer;
    box-shadow:0 6px 20px rgba(255,87,34,0.4); transition:all 0.2s; margin-top:4px;
  }
  .login-btn:hover { transform:translateY(-3px); }
  .login-err { color:#E53935; font-weight:700; font-size:0.88rem; margin-top:10px; min-height:20px; }
  .login-users { margin-top:20px; }
  .login-users-title { font-size:0.82rem; color:#90A4AE; font-weight:700; margin-bottom:10px; }
  .user-pill {
    display:inline-flex; align-items:center; gap:8px;
    background:#f07f05; border-radius:50px; padding:8px 16px;
    margin:4px; cursor:pointer; font-weight:800; font-size:0.9rem;
    color:#3949AB; transition:all 0.2s; border:2px solid transparent;
  }
  .user-pill:hover { background:#3F51B5; color:#f07f05; transform:translateY(-2px); }
  
</style>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<button class="student-btn" onclick="location.href='index.html'">👦 Student</button>
<button class="parent-btn" onclick="location.href='parent.html'">👨‍👩‍👧‍👦 Parents</button>
<button class="edu-btn" onclick="location.href='educator.html'">🎓 Educators</button>

<div class="login-card">
  <img src="corequest-logo.svg" alt="CoreQuest logo" width="400">
  <div class="login-subtitle">Your math adventure awaits!</div>

  <div class="login-field">
    <label>Username</label>
    <input type="text" id="login-username" placeholder="Enter your username" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <div class="login-field">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="login-btn" onclick="doLogin()">🚀 Let's Go!</button>
  <div class="login-err" id="login-err"></div>

  <div style="margin-top:20px;padding-top:16px;border-top:2px solid #F5F5F5;text-align:center;font-size:0.82rem;color:#B0BEC5;font-weight:600">
    🎓 Accounts are created by your educator or parent
  </div>

<script src="js/api.js"></script>
<script>


async function doLogin(){
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const err = document.getElementById('login-err');
  if(!u||!p){ err.textContent='Please fill in both fields!'; return; }
  err.style.color='#43A047'; err.textContent='Checking... ⏳';
  const userData = await apiGet('/user/'+encodeURIComponent(u));
  if(!userData || userData.error){ err.style.color='#E53935'; err.textContent='Username not found. Ask your educator!'; return; }
  if(userData.password !== btoa(p)){ err.style.color='#E53935'; err.textContent='Wrong password. Try again!'; return; }
  // Save session and go to game
  sessionStorage.setItem('mq_user', JSON.stringify({username:u, ...userData}));
  location.href = 'math.html';
}

</script>
</body>
</html>
